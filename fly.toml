# fly.toml — RekomendasiSahamV2
# Region: sin (Singapore) — terdekat dengan Indonesia
# Port  : 8000 (gunicorn)

app = "rekomendasi-saham-v2"
primary_region = "sin"

# ── Build ──────────────────────────────────────────────────────
[build]
  # Fly.io akan otomatis mendeteksi dan menggunakan Dockerfile di root
  dockerfile = "Dockerfile"

# ── Deploy ────────────────────────────────────────────────────
[deploy]
  release_command = ""
  strategy = "rolling"

# ── HTTP service ─────────────────────────────────────────────
[[services]]
  protocol   = "tcp"
  internal_port = 8000      # Port yang di-listen gunicorn di dalam container
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  # Health check — Fly.io akan restart container jika / tidak merespons
  [[services.http_checks]]
    interval      = "30s"
    timeout       = "10s"
    grace_period  = "60s"   # Beri waktu startup yang cukup (model loading)
    method        = "GET"
    path          = "/"
    protocol      = "http"

# ── VM / Machine ──────────────────────────────────────────────
[vm]
  # shared-cpu-1x = 1 shared vCPU, 256 MB RAM (untuk pakai API → cukup)
  # Naikkan ke "shared-cpu-2x" + memory = "512mb" jika masih OOM
  size   = "shared-cpu-1x"
  memory = "512mb"

# ── Environment variables (non-secret) ────────────────────────
# Secret (HF_API_KEY, MODEL_API_URL) di-set via:
#   fly secrets set HF_API_KEY=hf_xxx MODEL_API_URL=https://...
[env]
  FLASK_DEBUG = "false"
  PORT        = "8000"
